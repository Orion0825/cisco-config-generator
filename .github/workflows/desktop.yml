name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "electron/**"
      - "web/**"
      - "package.json"
      - ".github/workflows/desktop.yml"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            script: dist:mac
            artifact: Cisco-Config-Generator-macOS
            files: |
              dist/*.dmg
              dist/*.zip
          - name: Windows
            os: windows-latest
            script: dist:win
            artifact: Cisco-Config-Generator-Windows
            files: |
              dist/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build desktop app
        run: npm run ${{ matrix.script }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
