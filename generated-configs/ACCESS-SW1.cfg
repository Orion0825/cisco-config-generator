!
! cisco編輯器byOrion
! Cisco CLI 可複製貼上區 START
! 以下內容可直接貼到 Console / SSH
! Device layer: L2
!
hostname ACCESS-SW1
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
ip domain-name lab.local
ip name-server 1.1.1.1
ip name-server 8.8.8.8
ntp server 129.6.15.28
username netadmin privilege 15 secret 0 __MISSING_ENV_CISCO_NETADMIN_SECRET__
ip ssh version 2
crypto key generate rsa modulus 2048
!
spanning-tree mode rapid-pvst
spanning-tree portfast default
spanning-tree portfast bpduguard default
!
vlan 10
 name USERS
!
vlan 20
 name VOICE
!
vlan 99
 name MGMT
!
interface Port-channel1
 description Uplink port-channel
 switchport
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,99
 no shutdown
!
interface Vlan99
 description Management SVI
 ip address 10.99.0.11 255.255.255.0
 no shutdown
!
interface GigabitEthernet1/0/1
 description Uplink to BRANCH-R1
 switchport
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,99
 channel-group 1 mode active
 no shutdown
!
interface GigabitEthernet1/0/10
 description User desk
 switchport
 switchport mode access
 switchport access vlan 10
 switchport voice vlan 20
 spanning-tree portfast
 switchport port-security
 switchport port-security maximum 2
 switchport port-security violation restrict
 switchport port-security mac-address sticky
 spanning-tree bpduguard enable
 no shutdown
!
ip default-gateway 10.99.0.1
!
line vty 0 4
 login local
 transport input ssh
!
end
