!
! cisco編輯器byOrion
! Cisco CLI 可複製貼上區 START
! 以下內容可直接貼到 Console / SSH
! Device layer: L3
!
hostname BRANCH-R1
no ip domain-lookup
service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
ip domain-name lab.local
ip name-server 1.1.1.1
ip name-server 8.8.8.8
ntp server 129.6.15.28
username netadmin privilege 15 secret 0 __MISSING_ENV_CISCO_NETADMIN_SECRET__
ip ssh version 2
crypto key generate rsa modulus 2048
!
spanning-tree mode rapid-pvst
spanning-tree vlan 10,20,99 priority 4096
!
ip dhcp excluded-address 10.10.10.1 10.10.10.20
ip dhcp pool USERS
 network 10.10.10.0 255.255.255.0
 default-router 10.10.10.1
 dns-server 1.1.1.1 8.8.8.8
 domain-name lab.local
!
ip access-list extended INSIDE-NAT
 permit ip 10.10.10.0 0.0.0.255 any
!
ip access-list extended WAN-IN
 remark Basic inbound WAN filter
 deny ip any 10.10.10.0 0.0.0.255 log
 permit ip any any
!
vlan 10
 name USERS
!
vlan 20
 name VOICE
!
vlan 99
 name MGMT
!
interface GigabitEthernet0/0
 description WAN uplink
 ip address 203.0.113.2 255.255.255.252
 ip access-group WAN-IN in
 ip nat outside
 no shutdown
!
interface GigabitEthernet0/1
 description LAN trunk to access switch
 switchport
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,99
 channel-group 1 mode active
 no shutdown
!
interface Port-channel1
 description LAN port-channel
 switchport
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,99
 no shutdown
!
interface Vlan10
 description Users gateway
 ip address 10.10.10.2 255.255.255.0
 ip helper-address 10.10.10.10
 standby 10 ip 10.10.10.1
 standby 10 priority 110
 standby 10 preempt
 ip nat inside
 no shutdown
!
interface Loopback0
 description Router ID
 ip address 10.255.0.1 255.255.255.255
!
ip nat inside source list INSIDE-NAT interface GigabitEthernet0/0 overload
!
ip route 0.0.0.0 0.0.0.0 203.0.113.1
!
router ospf 10
 router-id 10.255.0.1
 network 10.255.0.1 0.0.0.0 area 0
!
router eigrp 100
 eigrp router-id 10.255.0.1
 network 10.255.0.1 0.0.0.0
 passive-interface GigabitEthernet0/1
 no auto-summary
!
router bgp 65001
 bgp router-id 10.255.0.1
 neighbor 203.0.113.1 remote-as 65000
 neighbor 203.0.113.1 description ISP edge
 network 203.0.113.0 mask 255.255.255.252
!
line vty 0 4
 login local
 transport input ssh
!
end
