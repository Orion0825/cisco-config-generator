<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cisco Config Generator</title>
    <link rel="stylesheet" href="styles.css?v=20260707-ui-editors">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">CG</div>
          <div>
            <h1>Cisco Config Generator</h1>
            <p id="statusText">尚未產生設定檔</p>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="quick-stats" aria-label="Inventory summary">
            <span><strong id="statDevices">0</strong><small>設備</small></span>
            <span><strong id="statL2">0</strong><small>L2</small></span>
            <span><strong id="statL3">0</strong><small>L3</small></span>
            <span><strong id="statRouting">0</strong><small>路由</small></span>
          </div>
          <div class="toolbar">
            <input id="fileInput" type="file" accept="application/json,.json" hidden>
            <button id="importBtn" type="button">匯入 JSON</button>
            <button id="exportBtn" type="button">匯出 JSON</button>
            <button id="addDeviceBtn" type="button">新增設備</button>
          </div>
        </div>
      </header>

      <main class="workspace">
        <aside class="device-panel" aria-label="設備清單">
          <div class="panel-title">
            <span>設備</span>
            <strong id="deviceCount">0</strong>
          </div>
          <div id="deviceList" class="device-list"></div>
          <div class="side-actions">
            <button id="duplicateDeviceBtn" type="button">複製設備</button>
            <button id="deleteDeviceBtn" type="button" class="danger">刪除設備</button>
          </div>
        </aside>

        <section class="editor-panel" aria-label="設定編輯區">
          <div class="tabs" role="tablist" aria-label="編輯模式">
            <button id="deviceTab" type="button" class="tab active">設備</button>
            <button id="advancedTab" type="button" class="tab">進階</button>
            <button id="defaultsTab" type="button" class="tab">預設值</button>
          </div>

          <form id="deviceForm" class="form-stack">
            <section class="section-block">
              <h2>基本資料</h2>
              <div class="field-grid">
                <label>
                  Hostname
                  <input name="hostname" autocomplete="off">
                </label>
                <label>
                  Role
                  <input name="role" autocomplete="off">
                </label>
                <label>
                  Layer
                  <select name="device_layer">
                    <option value="L3">L3</option>
                    <option value="L2">L2</option>
                  </select>
                </label>
                <label>
                  Platform
                  <select name="platform">
                    <option value="ios">ios</option>
                    <option value="ios-xe">ios-xe</option>
                    <option value="nx-os">nx-os</option>
                  </select>
                </label>
                <label>
                  Domain
                  <input name="domain_name" autocomplete="off" placeholder="沿用預設值">
                </label>
              </div>
            </section>

            <section class="section-block">
              <div class="section-heading">
                <h2>VLAN</h2>
                <button id="addVlanBtn" type="button">新增 VLAN</button>
              </div>
              <div id="vlanRows" class="rows"></div>
            </section>

            <section class="section-block">
              <div class="section-heading">
                <h2>Interface</h2>
                <button id="addInterfaceBtn" type="button">新增介面</button>
              </div>
              <div id="interfaceRows" class="rows"></div>
            </section>

            <section id="staticRouteSection" class="section-block routing-card routing-static">
              <div class="section-heading">
                <h2 id="staticRouteTitle">Static Route</h2>
                <button id="addStaticRouteBtn" type="button">新增路由</button>
              </div>
              <div id="staticRouteRows" class="rows"></div>
            </section>

            <section id="ospfSection" class="section-block routing-card routing-igp">
              <div class="section-heading">
                <h2>OSPF</h2>
                <label class="switch">
                  <input id="ospfEnabled" type="checkbox">
                  <span>啟用</span>
                </label>
              </div>
              <div id="ospfFields" class="ospf-fields">
                <div class="field-grid">
                  <label>
                    Process ID
                    <input id="ospfProcessId" type="number" min="1" value="1">
                  </label>
                  <label>
                    Router ID
                    <input id="ospfRouterId" autocomplete="off">
                  </label>
                </div>
                <div class="section-heading compact">
                  <h3>Network</h3>
                  <button id="addOspfNetworkBtn" type="button">新增 Network</button>
                </div>
                <div id="ospfNetworkRows" class="rows"></div>
              </div>
            </section>

            <section id="eigrpSection" class="section-block routing-card routing-igp">
              <div class="section-heading">
                <h2>EIGRP</h2>
                <label class="switch">
                  <input id="eigrpEnabled" type="checkbox">
                  <span>啟用</span>
                </label>
              </div>
              <div id="eigrpFields" class="protocol-fields">
                <div class="field-grid">
                  <label>
                    ASN
                    <input id="eigrpAsn" type="number" min="1" value="100">
                  </label>
                  <label>
                    Router ID
                    <input id="eigrpRouterId" autocomplete="off">
                  </label>
                  <label>
                    Passive Interfaces
                    <input id="eigrpPassiveInterfaces" autocomplete="off" placeholder="GigabitEthernet0/1,GigabitEthernet0/2">
                  </label>
                  <label class="switch field-switch">
                    <input id="eigrpNoAutoSummary" type="checkbox">
                    <span>No Auto Summary</span>
                  </label>
                </div>
                <div class="section-heading compact">
                  <h3>Network</h3>
                  <button id="addEigrpNetworkBtn" type="button">新增 Network</button>
                </div>
                <div id="eigrpNetworkRows" class="rows"></div>
              </div>
            </section>

            <section id="bgpSection" class="section-block routing-card routing-egp">
              <div class="section-heading">
                <h2>BGP</h2>
                <label class="switch">
                  <input id="bgpEnabled" type="checkbox">
                  <span>啟用</span>
                </label>
              </div>
              <div id="bgpFields" class="protocol-fields">
                <div class="field-grid">
                  <label>
                    Local ASN
                    <input id="bgpAsn" type="number" min="1" value="65001">
                  </label>
                  <label>
                    Router ID
                    <input id="bgpRouterId" autocomplete="off">
                  </label>
                </div>
                <div class="section-heading compact">
                  <h3>Neighbor</h3>
                  <button id="addBgpNeighborBtn" type="button">新增 Neighbor</button>
                </div>
                <div id="bgpNeighborRows" class="rows"></div>
                <div class="section-heading compact">
                  <h3>Network</h3>
                  <button id="addBgpNetworkBtn" type="button">新增 Network</button>
                </div>
                <div id="bgpNetworkRows" class="rows"></div>
              </div>
            </section>
          </form>

          <form id="advancedForm" class="form-stack hidden">
            <section class="section-block">
              <div class="section-heading">
                <h2>STP</h2>
                <button id="addStpPriorityBtn" type="button">新增 VLAN Priority</button>
              </div>
              <div class="field-grid">
                <label>
                  Mode
                  <select id="stpMode">
                    <option value="">停用</option>
                    <option value="pvst">pvst</option>
                    <option value="rapid-pvst">rapid-pvst</option>
                    <option value="mst">mst</option>
                  </select>
                </label>
                <label class="switch field-switch">
                  <input id="stpPortfastDefault" type="checkbox">
                  <span>PortFast Default</span>
                </label>
                <label class="switch field-switch">
                  <input id="stpBpduguardDefault" type="checkbox">
                  <span>BPDU Guard Default</span>
                </label>
              </div>
              <div id="stpPriorityRows" class="rows advanced-rows"></div>
            </section>

            <section class="section-block">
              <div class="section-heading">
                <h2>DHCP</h2>
                <button id="addDhcpExcludedBtn" type="button">新增排除位址</button>
              </div>
              <div id="dhcpExcludedRows" class="rows"></div>
              <div class="section-heading compact">
                <h3>Pool</h3>
                <button id="addDhcpPoolBtn" type="button">新增 Pool</button>
              </div>
              <div id="dhcpPoolRows" class="rows"></div>
            </section>

            <section class="section-block">
              <div class="section-heading">
                <h2>ACL</h2>
                <button id="addAclBtn" type="button">新增 ACL</button>
              </div>
              <div id="aclRows" class="rows"></div>
              <div class="section-heading compact">
                <h3>Entry</h3>
                <button id="addAclEntryBtn" type="button">新增 Entry</button>
              </div>
              <div id="aclEntryRows" class="rows"></div>
            </section>

            <section class="section-block">
              <div class="section-heading">
                <h2>NAT</h2>
                <button id="addNatRuleBtn" type="button">新增 NAT Overload</button>
              </div>
              <div id="natRows" class="rows"></div>
            </section>
          </form>

          <form id="defaultsForm" class="form-stack hidden">
            <section class="section-block">
              <h2>全域預設值</h2>
              <div class="field-grid">
                <label>
                  Domain
                  <input name="domain_name" autocomplete="off">
                </label>
                <label>
                  DNS
                  <input name="name_servers" autocomplete="off">
                </label>
                <label>
                  NTP
                  <input name="ntp_servers" autocomplete="off">
                </label>
                <label>
                  VTY Transport
                  <select name="vty_transport">
                    <option value="ssh">ssh</option>
                    <option value="telnet">telnet</option>
                    <option value="all">all</option>
                    <option value="none">none</option>
                  </select>
                </label>
              </div>
            </section>

            <section class="section-block">
              <h2>SSH 與本地帳號</h2>
              <div class="field-grid">
                <label class="switch field-switch">
                  <input name="ssh_enabled" type="checkbox">
                  <span>SSH</span>
                </label>
                <label>
                  RSA Modulus
                  <input name="ssh_modulus" type="number" min="1024" step="512">
                </label>
                <label>
                  Username
                  <input name="local_user_name" autocomplete="off">
                </label>
                <label>
                  Privilege
                  <input name="local_user_privilege" type="number" min="0" max="15">
                </label>
                <label>
                  Secret Type
                  <input name="local_user_secret_type" autocomplete="off">
                </label>
                <label>
                  Secret
                  <input name="local_user_secret" autocomplete="off">
                </label>
              </div>
            </section>
          </form>
        </section>

        <aside class="output-panel" aria-label="產生結果">
          <div class="panel-title">
            <span>輸出</span>
            <strong id="outputCount">0</strong>
          </div>
          <select id="outputSelect" aria-label="選擇輸出檔案"></select>
          <textarea id="configOutput" spellcheck="false" readonly></textarea>
          <div class="output-actions">
            <button id="copyConfigBtn" type="button">複製</button>
            <button id="downloadConfigBtn" type="button">下載 CFG</button>
          </div>
          <div id="messages" class="messages" aria-live="polite"></div>
        </aside>
      </main>
    </div>

    <script src="app.js?v=20260707-ui-editors"></script>
  </body>
</html>
